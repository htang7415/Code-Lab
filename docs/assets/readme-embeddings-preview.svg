<svg width="720" height="420" viewBox="0 0 720 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Embeddings preview</title>
  <desc id="desc">A simple embedding-space diagram with nearby semantic clusters and cosine similarity notes.</desc>
  <rect width="720" height="420" rx="24" fill="#F8FAFC"/>
  <rect x="20" y="20" width="680" height="380" rx="20" fill="white" stroke="#E2E8F0"/>
  <text x="56" y="76" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">Embeddings</text>
  <text x="56" y="106" fill="#475569" font-family="Arial, sans-serif" font-size="16">Nearby meaning becomes nearby vectors in one shared space.</text>
  <line x1="118" y1="316" x2="118" y2="148" stroke="#94A3B8" stroke-width="2"/>
  <line x1="118" y1="316" x2="342" y2="316" stroke="#94A3B8" stroke-width="2"/>
  <text x="100" y="152" fill="#64748B" font-family="Arial, sans-serif" font-size="12">z₂</text>
  <text x="332" y="334" fill="#64748B" font-family="Arial, sans-serif" font-size="12">z₁</text>
  <circle cx="182" cy="246" r="12" fill="#2563EB"/>
  <circle cx="214" cy="228" r="10" fill="#3B82F6"/>
  <circle cx="232" cy="264" r="10" fill="#60A5FA"/>
  <text x="164" y="288" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="14" font-weight="700">search</text>
  <circle cx="278" cy="210" r="12" fill="#10B981"/>
  <circle cx="312" cy="192" r="10" fill="#34D399"/>
  <circle cx="324" cy="230" r="10" fill="#6EE7B7"/>
  <text x="270" y="258" fill="#047857" font-family="Arial, sans-serif" font-size="14" font-weight="700">documents</text>
  <circle cx="212" cy="162" r="12" fill="#F59E0B"/>
  <circle cx="242" cy="144" r="10" fill="#FBBF24"/>
  <circle cx="256" cy="182" r="10" fill="#FCD34D"/>
  <text x="188" y="130" fill="#B45309" font-family="Arial, sans-serif" font-size="14" font-weight="700">queries</text>
  <path d="M238 158L292 202" stroke="#F59E0B" stroke-width="2.5" stroke-dasharray="6 6"/>
  <path d="M194 242L282 214" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6"/>
  <text x="374" y="170" fill="#0F172A" font-family="Arial, sans-serif" font-size="18" font-weight="700">Core idea</text>
  <rect x="374" y="188" width="282" height="80" rx="16" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="394" y="220" fill="#1E3A8A" font-family="Arial, sans-serif" font-size="16" font-weight="700">x → z = f(x)</text>
  <text x="394" y="246" fill="#334155" font-family="Arial, sans-serif" font-size="14">Cosine similarity and distance operate on</text>
  <text x="394" y="266" fill="#334155" font-family="Arial, sans-serif" font-size="14">geometry learned by the encoder.</text>
  <rect x="374" y="286" width="282" height="70" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="394" y="315" fill="#0F172A" font-family="Arial, sans-serif" font-size="16" font-weight="700">Use cases</text>
  <text x="394" y="338" fill="#475569" font-family="Arial, sans-serif" font-size="14">retrieval • clustering • reranking • transfer</text>
</svg>
