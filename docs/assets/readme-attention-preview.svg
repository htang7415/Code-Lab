  <text x="232" y="150" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12">the</text>
  <text x="268" y="150" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12">red</text>
  <text x="304" y="150" fill="#0F172A" font-family="Arial, sans-serif" font-size="12" font-weight="700">ball</text>
  <text x="342" y="150" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12">roll</text>
  <text x="378" y="150" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12">away</text>
  <text x="132" y="188" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12">I</text>
  <text x="128" y="222" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12">saw</text>
  <text x="128" y="256" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12">the</text>
  <text x="128" y="290" fill="#94A3B8" font-family="Arial, sans-serif" font-size="12">red</text>
  <text x="122" y="324" fill="#0F172A" font-family="Arial, sans-serif" font-size="12" font-weight="700">ball</text>
  <g transform="translate(152 164)">
