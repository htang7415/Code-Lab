<svg width="720" height="420" viewBox="0 0 720 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Attention preview</title>
  <desc id="desc">A causal attention heatmap preview with highlighted tokens and attention weights.</desc>
  <rect width="720" height="420" rx="24" fill="#F8FAFC"/>
  <rect x="20" y="20" width="680" height="380" rx="20" fill="white" stroke="#E2E8F0"/>
  <text x="56" y="76" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">Attention</text>
  <text x="56" y="106" fill="#475569" font-family="Arial, sans-serif" font-size="16">Each token reads from relevant earlier context through a weighted map.</text>
  <text x="82" y="150" fill="#64748B" font-family="Arial, sans-serif" font-size="13">query</text>
  <text x="158" y="334" fill="#64748B" font-family="Arial, sans-serif" font-size="13">key / value</text>
