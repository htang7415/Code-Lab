  <rect x="448" y="164" width="210" height="176" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="472" y="196" fill="#0F172A" font-family="Arial, sans-serif" font-size="18" font-weight="700">What it shows</text>
  <text x="472" y="224" fill="#334155" font-family="Arial, sans-serif" font-size="14">• causal masking blocks future tokens</text>
  <text x="472" y="248" fill="#334155" font-family="Arial, sans-serif" font-size="14">• stronger cells mean higher weight</text>
  <text x="472" y="272" fill="#334155" font-family="Arial, sans-serif" font-size="14">• the current token can focus on</text>
  <text x="490" y="294" fill="#334155" font-family="Arial, sans-serif" font-size="14">the noun and nearby context</text>
  <rect x="472" y="312" width="76" height="10" rx="5" fill="#1D4ED8"/>
  <rect x="552" y="312" width="44" height="10" rx="5" fill="#60A5FA"/>
  <rect x="600" y="312" width="24" height="10" rx="5" fill="#DBEAFE"/>
  <text x="472" y="338" fill="#64748B" font-family="Arial, sans-serif" font-size="13">high attention → medium → low</text>
